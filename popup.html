<!-- popup.html -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      padding: 16px;
      background: #fafafa;
      color: #1a1a1a;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e5e5e5;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 700;
      color: #1a1a1a;
    }
    .header .version {
      font-size: 11px;
      color: #999;
      margin-left: auto;
    }
    .connection-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    .connection-badge.connected { background: #dcfce7; color: #166534; }
    .connection-badge.disconnected { background: #fee2e2; color: #991b1b; }
    .connection-badge .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }
    .connection-badge.connected .dot { background: #22c55e; }
    .connection-badge.disconnected .dot { background: #ef4444; }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }
    .stat-card {
      background: white;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }
    .stat-card .number {
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
    }
    .stat-card .label {
      font-size: 10px;
      color: #888;
      margin-top: 3px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .stat-card.queued .number { color: #f97316; }
    .stat-card.done .number { color: #22c55e; }
    .stat-card.today .number { color: #3b82f6; }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 12px;
      color: #666;
    }
    .info-row .value { font-weight: 600; color: #333; }

    .token-section {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #e5e5e5;
    }
    .token-section label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 6px;
    }
    .token-row {
      display: flex;
      gap: 6px;
    }
    input {
      flex: 1;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #f97316; }
    button {
      padding: 8px 14px;
      background: #f97316;
      color: white;
      border: 0;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: background 0.2s;
    }
    button:hover { background: #ea580c; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    button.secondary {
      background: #f3f4f6;
      color: #374151;
    }
    button.secondary:hover { background: #e5e7eb; }

    .status-msg {
      margin-top: 8px;
      font-size: 11px;
      color: #888;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <span>🧩</span>
    <h1>MatchMaker BOOT</h1>
    <span class="version">v2.0</span>
  </div>

  <div id="badge" class="connection-badge disconnected">
    <span class="dot"></span>
    <span id="badge-text">Nicht verbunden</span>
  </div>

  <div class="stats-grid">
    <div class="stat-card queued">
      <div class="number" id="queued">–</div>
      <div class="label">In Queue</div>
    </div>
    <div class="stat-card done">
      <div class="number" id="completed">–</div>
      <div class="label">Gesendet</div>
    </div>
    <div class="stat-card today">
      <div class="number" id="today">–</div>
      <div class="label">Heute</div>
    </div>
  </div>

  <div class="info-row">
    <span>Status</span>
    <span class="value" id="active-status">—</span>
  </div>
  <div class="info-row">
    <span>Aktive Zeiten</span>
    <span class="value" id="active-hours">—</span>
  </div>
  <div class="info-row">
    <span>Tageslimit</span>
    <span class="value" id="daily-limit">—</span>
  </div>

  <div class="token-section">
    <label>Extension-Token</label>
    <div class="token-row">
      <input id="token" type="password" placeholder="Token eingeben…" />
      <button id="save">💾</button>
    </div>
  </div>

  <div class="status-msg" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
